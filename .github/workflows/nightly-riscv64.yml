name: riscv64-nightly

on:
  schedule:
    # 18:20 UTC daily (02:20 Asia/Shanghai)
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: riscv64-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-nightly:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      DEBIAN_FRONTEND: noninteractive
      OBJDIR: obj.intrgcc
      MACHINE: evbriscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reclaim runner disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup"
          df -h

          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true

          if command -v docker >/dev/null 2>&1; then
            sudo docker system prune -af || true
          fi

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "Disk usage after cleanup"
          df -h

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bc \
            bison \
            build-essential \
            byacc \
            ca-certificates \
            curl \
            e2fsprogs \
            file \
            flex \
            gawk \
            gperf \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            m4 \
            make \
            parted \
            pkg-config \
            python3 \
            python3-pip \
            qemu-system-misc \
            rsync \
            texinfo \
            u-boot-qemu \
            u-boot-tools

      - name: Resolve nightly metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          nightly_stamp="$(date -u +%Y%m%d)"
          ci_stamp="$(date -u +%Y%m%d%H%M%S)"
          short_sha="$(git rev-parse --short=12 "${GITHUB_SHA}")"
          nightly_tag="nightly-master-riscv64-${nightly_stamp}-${short_sha}"
          base_name="minix-cat-${nightly_tag}-ci-${ci_stamp}"

          image_name="${base_name}.img"
          image_path="/tmp/${image_name}"
          image_gz_name="${image_name}.gz"
          image_gz_path="/tmp/${image_gz_name}"
          elf_name="${base_name}.elf"
          elf_path="/tmp/${elf_name}"
          sysroot_name="${base_name}-sysroot.tar.gz"
          sysroot_path="/tmp/${sysroot_name}"
          sums_path="/tmp/SHA256SUMS.txt"

          echo "nightly_stamp=${nightly_stamp}" >>"${GITHUB_OUTPUT}"
          echo "ci_stamp=${ci_stamp}" >>"${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >>"${GITHUB_OUTPUT}"
          echo "nightly_tag=${nightly_tag}" >>"${GITHUB_OUTPUT}"
          echo "artifact_base=${base_name}" >>"${GITHUB_OUTPUT}"
          echo "image_name=${image_name}" >>"${GITHUB_OUTPUT}"
          echo "image_path=${image_path}" >>"${GITHUB_OUTPUT}"
          echo "image_gz_name=${image_gz_name}" >>"${GITHUB_OUTPUT}"
          echo "image_gz_path=${image_gz_path}" >>"${GITHUB_OUTPUT}"
          echo "elf_name=${elf_name}" >>"${GITHUB_OUTPUT}"
          echo "elf_path=${elf_path}" >>"${GITHUB_OUTPUT}"
          echo "sysroot_name=${sysroot_name}" >>"${GITHUB_OUTPUT}"
          echo "sysroot_path=${sysroot_path}" >>"${GITHUB_OUTPUT}"
          echo "sums_path=${sums_path}" >>"${GITHUB_OUTPUT}"

      - name: Build tools (obj.intrgcc)
        shell: bash
        run: |
          set -euo pipefail
          HARDENING_OFF="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fno-stack-protector"
          MKPCI=no HOST_CFLAGS="-O -fcommon ${HARDENING_OFF}" HOST_CXXFLAGS="-O ${HARDENING_OFF}" HAVE_GOLD=no HAVE_LLVM=no MKLLVM=no \
          ./build.sh -U -m "${MACHINE}" -O "${OBJDIR}" \
            -V AVAILABLE_COMPILER=gcc \
            -V ACTIVE_CC=gcc \
            -V ACTIVE_CPP=gcc \
            -V ACTIVE_CXX=gcc \
            -V ACTIVE_OBJC=gcc \
            -V MKGCC=yes \
            -V MKGCCCMDS=yes \
            -V MKCXX=yes \
            -V MKLIBSTDCXX=yes \
            tools

      - name: Prepare GCC include install dirs (obj.intrgcc)
        shell: bash
        run: |
          set -euo pipefail
          destdir_root="${PWD}/${OBJDIR}/destdir.${MACHINE}"
          src_include_root="${PWD}/external/gpl3/gcc/dist/libstdc++-v3/include"

          if [[ ! -d "${src_include_root}" ]]; then
            echo "Missing libstdc++ include tree: ${src_include_root}" >&2
            exit 1
          fi

          mkdir -p "${destdir_root}/usr/include/gcc-4.8"
          mkdir -p "${destdir_root}/usr/include/g++"

          # Mirror the libstdc++ include directory layout under DESTDIR so
          # install(1) never fails mkstemp on nested targets.
          find "${src_include_root}" -mindepth 1 -type d -print0 | \
          while IFS= read -r -d '' src_dir; do
            rel="${src_dir#${src_include_root}/}"
            mkdir -p "${destdir_root}/usr/include/g++/${rel}"
          done

      - name: Refresh ramdisk and libstdc++ objs (obj.intrgcc)
        shell: bash
        run: |
          set -euo pipefail
          destdir_root="${OBJDIR}/destdir.${MACHINE}"
          # The repository tracks obj.intrgcc; drop stale artifacts that can
          # leak host/thread profile mismatches into release images.
          rm -rf "${OBJDIR}/minix/drivers/storage/ramdisk"
          rm -rf "${OBJDIR}/external/gpl3/gcc/lib/libstdc++-v3"
          rm -f \
            "${destdir_root}/usr/lib/libstdc++.a" \
            "${destdir_root}/usr/lib/libstdc++_pic.a" \
            "${destdir_root}/usr/include/g++/bits/c++config.h"

          # Keep gthreads profile deterministic even when obj.intrgcc carries
          # stale generated headers from earlier CI iterations.
          sanitize_cxxconfig() {
            local cfg="$1"
            [[ -f "${cfg}" ]] || return 0
            sed -i -E \
              's@^#define[[:space:]]+_GLIBCXX_HAS_GTHREADS([[:space:]]+.*)?$@/* #undef _GLIBCXX_HAS_GTHREADS */@' \
              "${cfg}"
          }

          sanitize_cxxconfig "${PWD}/external/gpl3/gcc/lib/libstdc++-v3/arch/riscv64/c++config.h"

          if [[ -d "${destdir_root}/usr/include/g++" ]]; then
            while IFS= read -r -d '' cfg; do
              sanitize_cxxconfig "${cfg}"
            done < <(find "${destdir_root}/usr/include/g++" -type f -name 'c++config.h' -print0)
          fi

          functexcept_src="${PWD}/external/gpl3/gcc/dist/libstdc++-v3/src/c++11/functexcept.cc"
          if [[ ! -f "${functexcept_src}" ]]; then
            echo "Missing ${functexcept_src}" >&2
            exit 1
          fi
          # Some upstream snapshots don't use _GLIBCXX_HAS_GTHREADS here.
          # Patch the throw site directly so the no-future profile is stable.
          if ! grep -q '__throw_system_error(__i);' "${functexcept_src}"; then
            perl -0777 -i -pe \
              's@\{\s*_GLIBCXX_THROW_OR_ABORT\s*\(\s*future_error\s*\(\s*make_error_code\s*\(\s*future_errc\s*\(\s*__i\s*\)\s*\)\s*\)\s*\)\s*;@{\n#if !defined(_GLIBCXX_MINIX_NO_FUTURE)\n    _GLIBCXX_THROW_OR_ABORT(future_error(make_error_code(future_errc(__i))));\n#else\n    __throw_system_error(__i);\n#endif\n@g' \
              "${functexcept_src}"
          fi
          if ! grep -q '__throw_system_error(__i);' "${functexcept_src}"; then
            echo "Failed: no MINIX future fallback found in ${functexcept_src}" >&2
            exit 1
          fi
          grep -nE '__throw_future_error|future_errc|_GLIBCXX_MINIX_NO_FUTURE|__throw_system_error' \
            "${functexcept_src}" | head -n 20 || true

      - name: Build distribution (obj.intrgcc)
        shell: bash
        run: |
          set -euo pipefail
          HARDENING_OFF="-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -fno-stack-protector"
          MKPCI=no HOST_CFLAGS="-O -fcommon ${HARDENING_OFF}" HOST_CXXFLAGS="-O ${HARDENING_OFF}" HAVE_GOLD=no HAVE_LLVM=no MKLLVM=no \
          ./build.sh -U -u -j"$(nproc)" -m "${MACHINE}" -O "${OBJDIR}" \
            -V AVAILABLE_COMPILER=gcc \
            -V ACTIVE_CC=gcc \
            -V ACTIVE_CPP=gcc \
            -V ACTIVE_CXX=gcc \
            -V ACTIVE_OBJC=gcc \
            -V RISCV_ARCH_FLAGS='-march=RV64IMAFD -mcmodel=medany' \
            -V NOGCCERROR=yes \
            -V MKGCC=yes \
            -V MKGCCCMDS=yes \
            -V MKCXX=yes \
            -V MKLIBSTDCXX=yes \
            -V MKLIBOBJC=no \
            -V MKLIBGOMP=no \
            -V MKATF=no \
            -V USE_PCI=no \
            -V CHECKFLIST_FLAGS='-m -e' \
            distribution

      - name: Verify native toolchain payload (DESTDIR)
        shell: bash
        run: |
          set -euo pipefail
          root="${PWD}/${OBJDIR}/destdir.evbriscv64"
          missing=()

          # Align with local packaging behavior: frontend aliases may differ.
          # Require at least one from each alias group, then enforce core binutils.
          if [[ ! -x "${root}/usr/bin/cc" && ! -x "${root}/usr/bin/gcc" ]]; then
            missing+=("usr/bin/(cc|gcc)")
          fi
          if [[ ! -x "${root}/usr/bin/c++" && ! -x "${root}/usr/bin/g++" ]]; then
            missing+=("usr/bin/(c++|g++)")
          fi
          if [[ ! -x "${root}/usr/bin/cpp" && ! -x "${root}/usr/bin/gcpp" ]]; then
            missing+=("usr/bin/(cpp|gcpp)")
          fi

          for bin in as ld ar ranlib nm objcopy objdump readelf strip; do
            if [[ ! -x "${root}/usr/bin/${bin}" ]]; then
              missing+=("usr/bin/${bin}")
            fi
          done

          for entry in \
            usr/lib/libgcc.a \
            usr/lib/libgcc_eh.a \
            usr/lib/libstdc++.a \
            usr/include/stdio.h \
            usr/include/g++/bits/c++config.h; do
            if [[ ! -e "${root}/${entry}" ]]; then
              missing+=("${entry}")
            fi
          done

          if [[ "${#missing[@]}" -ne 0 ]]; then
            echo "[native-toolchain] missing payload entries:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

          echo "[native-toolchain] payload check PASS"

      - name: Verify libstdc++ thread profile (DESTDIR)
        shell: bash
        run: |
          set -euo pipefail
          root="${PWD}/${OBJDIR}/destdir.evbriscv64"
          tooldir="$(find "${PWD}/${OBJDIR}" -maxdepth 1 -type d -name 'tooldir.*' -print -quit)"
          if [[ -z "${tooldir}" ]]; then
            echo "Missing tooldir under ${PWD}/${OBJDIR}" >&2
            exit 1
          fi

          ar="${tooldir}/bin/riscv64-elf32-minix-ar"
          nm="${tooldir}/bin/riscv64-elf32-minix-nm"
          lib="${root}/usr/lib/libstdc++.a"
          for tool in "${ar}" "${nm}"; do
            if [[ ! -x "${tool}" ]]; then
              echo "Missing tool: ${tool}" >&2
              exit 1
            fi
          done
          if [[ ! -f "${lib}" ]]; then
            echo "Missing libstdc++ archive: ${lib}" >&2
            exit 1
          fi

          tmp="$(mktemp -d)"
          trap 'rm -rf "${tmp}"' EXIT
          (
            cd "${tmp}"
            "${ar}" x "${lib}" functexcept.o
            "${nm}" -u functexcept.o >undef.txt
          )

          if grep -Eq 'future_category|future_error' "${tmp}/undef.txt"; then
            echo "[native-toolchain] libstdc++ mismatch: functexcept.o unexpectedly references future_*" >&2
            cat "${tmp}/undef.txt" >&2
            exit 1
          fi

          echo "[native-toolchain] libstdc++ thread profile check PASS"

      - name: Build nightly artifacts
        id: package
        shell: bash
        run: |
          set -euo pipefail
          kernel_path="${PWD}/${OBJDIR}/minix/kernel/kernel"
          destdir_root="${PWD}/${OBJDIR}/destdir.evbriscv64"

          minix/releasetools/riscv64/mkdisk.sh \
            -d "${OBJDIR}" \
            -o "${{ steps.meta.outputs.image_path }}" \
            -s 1024 \
            -u 768 \
            -U

          gzip -n -9 -c "${{ steps.meta.outputs.image_path }}" >"${{ steps.meta.outputs.image_gz_path }}"

          cp "${kernel_path}" "${{ steps.meta.outputs.elf_path }}"

          sysroot_items=()
          for path in usr/include usr/lib lib; do
            if [[ -e "${destdir_root}/${path}" ]]; then
              sysroot_items+=("${path}")
            fi
          done
          if [[ "${#sysroot_items[@]}" -eq 0 ]]; then
            echo "No sysroot headers/libs found under ${destdir_root}" >&2
            exit 1
          fi
          tar -C "${destdir_root}" -czf "${{ steps.meta.outputs.sysroot_path }}" "${sysroot_items[@]}"

          (
            cd /tmp
            sha256sum \
              "${{ steps.meta.outputs.image_name }}" \
              "${{ steps.meta.outputs.image_gz_name }}" \
              "${{ steps.meta.outputs.elf_name }}" \
              "${{ steps.meta.outputs.sysroot_name }}" \
              >"$(basename "${{ steps.meta.outputs.sums_path }}")"
          )

      - name: QEMU interactive smoke test (neofetch + shutdown chain)
        timeout-minutes: 8
        shell: bash
        env:
          CI_IMAGE_PATH: ${{ steps.meta.outputs.image_path }}
          QEMU_SMOKE_LOG: /tmp/qemu-neofetch-smoke.log
        run: |
          set -euo pipefail
          smoke_image="${CI_IMAGE_PATH}.smoke"
          cp -f "${CI_IMAGE_PATH}" "${smoke_image}"
          cleanup_smoke_image() {
            rm -f "${smoke_image}" || true
          }
          trap cleanup_smoke_image EXIT
          export CI_SMOKE_IMAGE_PATH="${smoke_image}"
          python3 - <<'PY'
          import os
          import re
          import time
          import fcntl
          import select
          import subprocess
          import sys

          image_path = os.environ["CI_SMOKE_IMAGE_PATH"]
          log_path = os.environ["QEMU_SMOKE_LOG"]
          uboot_path = "/usr/lib/u-boot/qemu-riscv64_smode/uboot.elf"

          if not os.path.isfile(image_path):
            print(f"[smoke] missing image: {image_path}", file=sys.stderr)
            sys.exit(1)
          if not os.path.isfile(uboot_path):
            print(f"[smoke] missing u-boot: {uboot_path}", file=sys.stderr)
            sys.exit(1)

          cmd = [
            "qemu-system-riscv64",
            "-machine", "virt",
            "-m", "512M",
            "-nographic",
            "-bios", "default",
            "-kernel", uboot_path,
            "-drive", f"if=none,file={image_path},format=raw,id=hd0",
            "-device", "virtio-blk-device,drive=hd0",
          ]
          print("[smoke] launching qemu:", " ".join(cmd))

          proc = subprocess.Popen(
            cmd,
            stdin=subprocess.PIPE,
            stdout=subprocess.PIPE,
            stderr=subprocess.STDOUT,
          )
          if proc.stdin is None or proc.stdout is None:
            print("[smoke] failed to open qemu stdio", file=sys.stderr)
            sys.exit(1)

          fd = proc.stdout.fileno()
          flags = fcntl.fcntl(fd, fcntl.F_GETFL)
          fcntl.fcntl(fd, fcntl.F_SETFL, flags | os.O_NONBLOCK)

          os.makedirs(os.path.dirname(log_path), exist_ok=True)
          logf = open(log_path, "w", encoding="utf-8", errors="ignore")
          buf = ""

          def pump(seconds=0.4):
            global buf
            end = time.time() + seconds
            while time.time() < end:
              r, _, _ = select.select([fd], [], [], 0.1)
              if not r:
                if proc.poll() is not None:
                  return
                continue
              try:
                data = os.read(fd, 65536)
              except BlockingIOError:
                data = b""
              if not data:
                if proc.poll() is not None:
                  return
                continue
              text = data.decode("utf-8", errors="ignore")
              buf += text
              if len(buf) > 800000:
                buf = buf[-400000:]
              logf.write(text)
              logf.flush()

          def wait_for(pattern, timeout, label):
            rx = re.compile(pattern, re.M)
            end = time.time() + timeout
            while time.time() < end:
              if rx.search(buf):
                print(f"[smoke] ok: {label}")
                return True
              if proc.poll() is not None:
                break
              pump(0.5)
            print(f"[smoke] timeout: {label}", file=sys.stderr)
            return False

          def send_line(line):
            print(f"[smoke] send: {line}")
            proc.stdin.write((line + "\n").encode("utf-8"))
            proc.stdin.flush()

          def shutdown_qemu():
            if proc.poll() is not None:
              return
            try:
              proc.stdin.write(b"\x01x")
              proc.stdin.flush()
            except Exception:
              pass
            end = time.time() + 8
            while time.time() < end and proc.poll() is None:
              pump(0.3)
            if proc.poll() is None:
              proc.terminate()
              try:
                proc.wait(timeout=5)
              except subprocess.TimeoutExpired:
                proc.kill()
                proc.wait(timeout=5)

          ok = True
          try:
            ok &= wait_for(r"(?:^|\n)#\s", 240, "shell prompt")

            if ok:
              send_line("neofetch")
              ok &= wait_for(r"Donz Fetch", 90, "neofetch banner")
              ok &= wait_for(r"OS:\s+Minix Cat", 90, "neofetch os line")
              ok &= wait_for(r"(?:^|\n)#\s", 90, "prompt after neofetch")

            if ok:
              send_line("/sbin/shutdown -p now || /sbin/halt -p || /sbin/poweroff || /sbin/reboot -p || /sbin/reboot")
              ok &= wait_for(
                r"MINIX has halted and will now power off|MINIX will now be shut down",
                150,
                "shutdown banner",
              )

            if re.search(r"sh:\s+/sbin/(shutdown|halt|poweroff|reboot): not found", buf):
              print("[smoke] detected missing shutdown binary in guest output", file=sys.stderr)
              ok = False
          finally:
            shutdown_qemu()
            pump(1.0)
            logf.close()

          if not ok:
            print(f"[smoke] failed. log saved to: {log_path}", file=sys.stderr)
            sys.exit(1)

          print(f"[smoke] passed. log saved to: {log_path}")
          PY

      - name: Upload QEMU smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-nightly-smoke-log-${{ steps.meta.outputs.nightly_stamp }}-${{ steps.meta.outputs.short_sha }}
          if-no-files-found: ignore
          path: /tmp/qemu-neofetch-smoke.log
          retention-days: 14

      - name: Full riscv64 test suite (blocking)
        id: full_suite
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          log="/tmp/riscv64-full-suite.log"
          image="${{ steps.meta.outputs.image_path }}"
          echo "[full-suite] log: ${log}"
          : >"${log}"
          export KERNEL="${OBJDIR}/minix/kernel/kernel"
          export DESTDIR="${OBJDIR}/destdir.evbriscv64"
          export SMOKE_DISK_IMAGE="${image}"
          export SMOKE_DD_UNSAFE=1
          export SMOKE_ROUNDS=1
          export SMOKE_GATE_TIMEOUT=180
          export NATIVE_GATE_TIMEOUT=300
          export NATIVE_GATE_CMD_TIMEOUT=180
          run_case() {
            local name="$1"
            shift
            echo "[full-suite] >>> ${name}" | tee -a "${log}"
            if "$@" >>"${log}" 2>&1; then
              echo "[full-suite] ${name}: PASS" | tee -a "${log}"
            else
              local rc="$?"
              echo "[full-suite] ${name}: FAIL (rc=${rc})" | tee -a "${log}"
              return "${rc}"
            fi
          }

          if run_case build ./minix/tests/riscv64/run_tests.sh build \
             && run_case user ./minix/tests/riscv64/run_tests.sh user \
             && run_case native ./minix/tests/riscv64/run_tests.sh native \
             && run_case kernel ./minix/tests/riscv64/run_tests.sh kernel \
             && run_case gate timeout 900 ./minix/tests/riscv64/run_tests.sh gate; then
            echo "rc=0" >>"${GITHUB_OUTPUT}"
            echo "[full-suite] rc=0"
          else
            rc=$?
            echo "rc=${rc}" >>"${GITHUB_OUTPUT}"
            echo "[full-suite] rc=${rc}"
            tail -n 200 "${log}" || true
            exit "${rc}"
          fi

      - name: Upload full test suite log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-nightly-full-suite-log-${{ steps.meta.outputs.nightly_stamp }}-${{ steps.meta.outputs.short_sha }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            /tmp/riscv64-full-suite.log

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-nightly-${{ steps.meta.outputs.nightly_stamp }}-${{ steps.meta.outputs.short_sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            ${{ steps.meta.outputs.image_path }}
            ${{ steps.meta.outputs.image_gz_path }}
            ${{ steps.meta.outputs.elf_path }}
            ${{ steps.meta.outputs.sysroot_path }}
            ${{ steps.meta.outputs.sums_path }}

      - name: Create nightly tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.nightly_tag }}"

          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "Nightly tag already exists: ${tag} (skip)"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "MINIX riscv64 nightly ${tag}"
          git push origin "refs/tags/${tag}"
          echo "Created nightly tag: ${tag}"

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.nightly_tag }}
          target_commitish: ${{ github.sha }}
          name: MINIX riscv64 nightly ${{ steps.meta.outputs.nightly_tag }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            ${{ steps.meta.outputs.image_path }}
            ${{ steps.meta.outputs.image_gz_path }}
            ${{ steps.meta.outputs.elf_path }}
            ${{ steps.meta.outputs.sysroot_path }}
            ${{ steps.meta.outputs.sums_path }}

      - name: Write nightly summary
        if: always()
        shell: bash
        run: |
          suite_rc="${{ steps.full_suite.outputs.rc }}"
          [ -n "${suite_rc}" ] || suite_rc="n/a"
          {
            echo "## riscv64 Nightly"
            echo ""
            echo "- Date (UTC): ${{ steps.meta.outputs.nightly_stamp }}"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Nightly tag: \`${{ steps.meta.outputs.nightly_tag }}\`"
            echo "- CI stamp (UTC): \`${{ steps.meta.outputs.ci_stamp }}\`"
            echo "- Artifact base: \`${{ steps.meta.outputs.artifact_base }}\`"
            echo "- Image: \`${{ steps.meta.outputs.image_name }}\`"
            echo "- Compressed image: \`${{ steps.meta.outputs.image_gz_name }}\`"
            echo "- ELF: \`${{ steps.meta.outputs.elf_name }}\`"
            echo "- Sysroot: \`${{ steps.meta.outputs.sysroot_name }}\`"
            echo ""
            echo "### Full Test Suite (blocking)"
